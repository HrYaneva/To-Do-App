<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>To‑Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Моите задачи</h1>
    <button id="themeToggle" onclick="toggleTheme()">Dark Mode</button>


    <div class="input-area">
        <input id="taskInput" type="text" placeholder="Въведи задача...">
      
    <input type="text" id="searchInput" placeholder="Търси задача..." onkeyup="searchTasks()">
<div id="filters">
    <button onclick="filterTasks('all')">Всички</button>
    <button onclick="filterTasks('completed')">Готови</button>
    <button onclick="filterTasks('active')">Неготови</button>
    </div>

</div>

        <button onclick="addTask()">Добави</button>
        <button id="clearAll" onclick="clearAllTasks()">Изчисти всички</button>
  
    <ul id="taskList"></ul>

    <script src="script.js"></script>
</body>
</html>
