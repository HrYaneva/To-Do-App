<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Моите задачи</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Моите задачи</h1>

    <div id="topBar">
        <button id="themeToggle" type="button" onclick="toggleDarkMode()">Dark Mode</button>

        <select id="themeSelect" onchange="changeTheme(this.value)">
            <option value="default">Тема: Стандартна</option>
            <option value="sunset">Тема: Sunset</option>
            <option value="ocean">Тема: Ocean</option>
            <option value="forest">Тема: Forest</option>
            <option value="neon">Тема: Neon</option>
            <option value="glassblack">Тема: Glass Black</option>
        </select>
    </div>

    <!-- ДВЕТЕ КУТИИ -->
    <div id="topRow">

        <!-- ЛЯВА КУТИЯ: Нова задача -->
        <div class="input-area">
            <h2>Нова задача</h2>

            <div class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M4 7h16M4 12h16M4 17h10" stroke="#555" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <input id="taskInput" type="text" placeholder="Въведи задача...">
            </div>

            <select id="categorySelect">
                <option value="work">Работа</option>
                <option value="home">Дом</option>
                <option value="school">Училище</option>
                <option value="personal">Лични</option>
            </select>

            <select id="prioritySelect">
                <option value="low">🕓 Нисък приоритет</option>
                <option value="medium">⭐ Среден приоритет</option>
                <option value="high">🔥 Висок приоритет</option>
            </select>

            <div class="reminder-row">
                <input id="dateInput" type="date" title="Дата за напомняне">
                <input id="timeInput" type="time" title="Час за напомняне">
            </div>

            <div class="button-row">
                <button id="addBtn" type="button" onclick="addTask()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M12 5v14M5 12h14" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Добави
                </button>

                <button id="clearAll" type="button" onclick="clearAllTasks()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M6 6l12 12M6 18L18 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Изчисти всички
                </button>
            </div>
        </div>

        <!-- ДЯСНА КУТИЯ: Търсене, филтри, календар -->
        <div id="searchArea">
            <h2>Търсене и филтри</h2>

            <div class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <circle cx="11" cy="11" r="7" stroke="#555" stroke-width="2"/>
                    <path d="M20 20l-4-4" stroke="#555" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <input id="searchInput" type="text" placeholder="Търси задача..." oninput="searchTasks()">
            </div>

            <div id="filters">
                <button type="button" onclick="filterTasks('all')">Всички</button>
                <button type="button" onclick="filterTasks('completed')">Готови</button>
                <button type="button" onclick="filterTasks('active')">Неготови</button>
            </div>

            <div id="priorityFilters">
                <button type="button" onclick="filterByPriority('all')">Всички приоритети</button>
                <button type="button" onclick="filterByPriority('high')">🔥 Висок</button>
                <button type="button" onclick="filterByPriority('medium')">⭐ Среден</button>
                <button type="button" onclick="filterByPriority('low')">🕓 Нисък</button>
            </div>

            <div id="categoryFilters">
                <button type="button" onclick="filterByCategory('all')">Всички категории</button>
                <button type="button" onclick="filterByCategory('work')">Работа</button>
                <button type="button" onclick="filterByCategory('home')">Дом</button>
                <button type="button" onclick="filterByCategory('school')">Училище</button>
                <button type="button" onclick="filterByCategory('personal')">Лични</button>
            </div>

            <div id="calendarBox">
                <h3>Календар</h3>
                <input id="calendarInput" type="date" onchange="filterByDate(this.value)">
            </div>
        </div>

    </div>

    <!-- СПИСЪК СЪС ЗАДАЧИ -->
    <div id="listsWrapper">
        <div class="category-column" data-cat="work">
            <h3>Работа</h3>
            <ul id="taskList-work" class="taskList"></ul>
        </div>
        <div class="category-column" data-cat="home">
            <h3>Дом</h3>
            <ul id="taskList-home" class="taskList"></ul>
        </div>
        <div class="category-column" data-cat="school">
            <h3>Училище</h3>
            <ul id="taskList-school" class="taskList"></ul>
        </div>
        <div class="category-column" data-cat="personal">
            <h3>Лични</h3>
            <ul id="taskList-personal" class="taskList"></ul>
        </div>
    </div>

    <!-- ЗВУК ПРИ ДОБАВЯНЕ -->
    <audio id="addSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7b4d1f0e4e.mp3?filename=click-124467.mp3"></audio>

    <!-- FLOATING ADD BUTTON -->
    <button id="fab" onclick="addTask()">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>

    <script src="script.js"></script>
</body>
</html>
